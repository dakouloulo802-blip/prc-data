name: PRC Auto Scraper

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

  permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install cheerio

      - name: Run scraper
        run: node scraper.js

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "auto update PRC data" || echo "no changes"
          git push
